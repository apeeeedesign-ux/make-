<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>送信完了 | make-design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&family=Dancing+Script:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue-deep:#1c3254;--blue-mid:#3a6491;--blue-mist:#aac8e4;--tea:#c4a882;--cream:#faf8f5;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--blue-deep);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 5%;}
.card{background:#fff;border:1px solid rgba(170,200,228,.3);border-radius:4px;padding:3rem 2.5rem;text-align:center;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(28,50,84,.08);}
.icon{font-size:2.8rem;margin-bottom:1.2rem;}
.script{font-family:'Dancing Script',cursive;font-size:1.2rem;color:var(--blue-mist);margin-bottom:.8rem;}
h1{font-family:'Noto Serif JP',serif;font-size:1.4rem;font-weight:300;color:var(--blue-deep);margin-bottom:1rem;letter-spacing:.06em;}
p{font-size:.88rem;color:#4a6480;line-height:2;margin-bottom:2rem;}
a{display:inline-flex;align-items:center;gap:.6rem;background:var(--blue-mid);color:#fff;padding:12px 32px;font-size:.8rem;letter-spacing:.18em;text-decoration:none;transition:opacity .2s;}
a:hover{opacity:.85;}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🌸</div>
    <p class="script">Thank you !</p>
    <h1>送信が完了しました</h1>
    <p>お問い合わせいただきありがとうございます。<br>
    内容を確認次第、2〜3営業日以内にご返信いたします。<br>
    しばらくお待ちください。</p>
    <a href="index.html">← トップページへ戻る</a>
  </div>
</body>
</html>
